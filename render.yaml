services:
  - type: web
    runtime: python
    name: stock-backend-ot95
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: REDIS_URL
        sync: false
      - key: ML_CLIENT_ID
        sync: false
      - key: ML_CLIENT_SECRET
        sync: false
      - key: ML_REDIRECT_URI
        sync: false
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: UPLOADS_DIR
        value: uploads
      - key: FIRST_SUPERUSER_EMAIL
        sync: false
      - key: FIRST_SUPERUSER_PASSWORD
        sync: false
      - key: FIRST_SUPERUSER_FULL_NAME
        value: Admin

  - type: web
    runtime: static
    name: FT
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        value: https://stock-backend-ot95.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html